# Close issues and PRs that have gone stale to keep the backlog actionable.
# Issues are marked stale after 60 days of inactivity; PRs after 30 days.
# Stale items are closed after a further 7 days if there is no new activity.

name: Stale

on:
  schedule:
    - cron: "0 9 * * *"  # run daily at 09:00 UTC

jobs:
  stale:
    name: Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9  # mark and close stale issues and PRs
        with:
          stale-issue-message: "This issue has been inactive for 60 days and will be closed in 7 days unless there is further activity."  # posted when an issue is marked stale
          stale-pr-message: "This PR has been inactive for 30 days and will be closed in 7 days. Please rebase and update if you'd like it reviewed."  # posted when a PR is marked stale
          days-before-issue-stale: 60  # days of inactivity before an issue is marked stale
          days-before-pr-stale: 30     # days of inactivity before a PR is marked stale
          days-before-close: 7         # days after being marked stale before the item is closed
